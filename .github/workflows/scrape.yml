name: base-be-tertiaire

on:
  workflow_dispatch:
    inputs:
      dep:
        description: "Departement a limiter (ex: 69). Vide = France entiere."
        default: ""
        required: false
      skip_enrich:
        description: "true = sans enrichissement SIRENE/BODACC/sites (plus rapide)"
        default: "false"
        required: false

permissions:
  contents: write   # necessaire pour que le workflow puisse commit dans le repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Restaurer le cache depuis data/ (reprise entre runs)
        run: |
          if [ -f data/base_be_max_national.csv ]; then
            cp -f data/base_be_max_national.csv base_be_max_national.csv
            echo "cache restaure depuis data/ : $(wc -l < base_be_max_national.csv) lignes"
          else
            echo "pas de cache, run initial (pull ADEME)"
          fi

      - name: Run pipeline
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.dep }}" ]; then
            ARGS="$ARGS --dep ${{ github.event.inputs.dep }}"
          fi
          if [ "${{ github.event.inputs.skip_enrich }}" = "true" ]; then
            ARGS="$ARGS --skip-enrich"
          fi
          python annuaire_be_v2.py $ARGS

      # 1) copie des resultats dans le dossier data/ du repo
      - name: Ranger les resultats dans data/
        run: |
          mkdir -p data
          cp -f base_be_tertiaire.xlsx data/ 2>/dev/null || true
          cp -f base_be_max_national.csv data/ 2>/dev/null || true
          cp -f base_be_max_aura.csv data/ 2>/dev/null || true
          cp -f base_be_max_69.csv data/ 2>/dev/null || true
          cp -f run_summary.json data/ 2>/dev/null || true

      # 2) commit automatique dans le repo (visible dans l'onglet Code)
      - name: Commit des resultats dans le repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "MAJ base BE tertiaire (run #${{ github.run_number }})" || echo "rien a committer"
          git push || echo "push echoue (verifier permissions)"

      # 3) on garde aussi l'artifact telechargeable en secours
      - name: Upload resultats (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: base-be-tertiaire-${{ github.run_number }}
          path: |
            base_be_tertiaire.xlsx
            base_be_max_national.csv
            base_be_max_aura.csv
            base_be_max_69.csv
            run_summary.json
          if-no-files-found: warn
          retention-days: 90
