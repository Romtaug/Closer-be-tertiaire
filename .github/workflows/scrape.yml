name: base-be-tertiaire

on:
  workflow_dispatch:
    inputs:
      quals:
        description: "Codes qualification OPQIBI (separes par espaces)"
        default: "1905"
        required: true
      scan_ids:
        description: "Fallback scan IDs 'START END' (laisser vide sinon)"
        default: ""
        required: false
      skip_enrich:
        description: "true = sans enrichissement SIRENE/BODACC/sites"
        default: "false"
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          ARGS="--quals ${{ github.event.inputs.quals }}"
          if [ -n "${{ github.event.inputs.scan_ids }}" ]; then
            ARGS="$ARGS --scan-ids ${{ github.event.inputs.scan_ids }}"
          fi
          if [ "${{ github.event.inputs.skip_enrich }}" = "true" ]; then
            ARGS="$ARGS --skip-enrich"
          fi
          python annuaire_be_v2.py $ARGS

      - name: Upload resultats
        uses: actions/upload-artifact@v4
        with:
          name: base-be-tertiaire-${{ github.run_number }}
          path: |
            base_be_tertiaire.xlsx
            base_be_max_national.csv
            base_be_max_aura.csv
            base_be_max_69.csv
            run_summary.json
          if-no-files-found: warn
          retention-days: 90
